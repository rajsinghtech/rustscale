name: Bench harness

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Credential-free harness validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate benchmark harness
        run: tools/bench/check.sh
