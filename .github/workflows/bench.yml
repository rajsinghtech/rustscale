name: Bench

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: Throughput + latency benchmarks
    if: github.repository == 'rajsinghtech/rustscale'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iperf3 socat ncat jq

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Mint Tailscale org token via GitHub OIDC (WIF)
        id: tsauth
        run: |
          AUD="api.tailscale.com/TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL"
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD" | jq -r '.value')
          echo "::add-mask::$JWT"
          TOKEN=$(curl -sS -X POST https://api.tailscale.com/api/v2/oauth/token-exchange \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -d 'client_id=TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL' -d "jwt=$JWT" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "OIDC token-exchange failed" >&2; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Build rustscale-bench
        run: cargo build -p rustscale-bench --release --locked

      - name: Run rustscale benchmark
        env:
          TS_ORG_TOKEN: ${{ steps.tsauth.outputs.token }}
          BENCH_DURATION: "10"
          BENCH_PARALLEL: "1"
          BENCH_DIRECTION: "down"
        run: tools/bench/run-local.sh

      - name: Install tailscaled
        run: |
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/jammy.tailscale-keyring.list | sudo tee /etc/apt/sources.list.d/tailscale.list
          sudo apt-get update
          sudo apt-get install -y tailscale

      - name: Run tailscaled benchmark
        env:
          TS_ORG_TOKEN: ${{ steps.tsauth.outputs.token }}
          BENCH_DURATION: "10"
          BENCH_PARALLEL: "1"
          BENCH_DIRECTION: "down"
        run: tools/bench/run-tailscaled.sh

      - name: Build tsrs-bench
        run: cargo build --manifest-path crates/bench-tsrs/Cargo.toml --release

      - name: Run tailscale-rs benchmark
        env:
          TS_ORG_TOKEN: ${{ steps.tsauth.outputs.token }}
          BENCH_DURATION: "10"
          BENCH_PARALLEL: "1"
          BENCH_DIRECTION: "down"
        run: tools/bench/run-tailscale-rs.sh

      - name: Upload bench results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bench-results
          path: bench-results/
          retention-days: 30
