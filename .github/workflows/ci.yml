name: CI

on:
  push:
    branches: [master]
  pull_request:
  merge_group:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Build, test, clippy (linux)
            check_only: false
          - os: macos-latest
            name: Build, test, clippy (macos)
            check_only: false
          - os: windows-latest
            name: Check (windows)
            check_only: true
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Build
        if: ${{ !matrix.check_only }}
        run: cargo build --workspace --all-targets --locked
      - name: Test
        if: ${{ !matrix.check_only }}
        run: cargo test --workspace --locked
      - name: Clippy
        if: ${{ !matrix.check_only || matrix.os == 'windows-latest' }}
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Check (windows)
        if: ${{ matrix.check_only }}
        run: cargo check --workspace --locked
      - name: Test (windows-meaningful crates)
        if: ${{ matrix.check_only && matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          cargo test -p rustscale-ipn -p rustscale-localclient -p rustscale-tailcfg \
            -p rustscale-key -p rustscale-disco -p rustscale-safesocket \
            -p rustscale-posture --locked
      - name: Format check
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: cargo fmt --all --check
      - name: Release and installer contract
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          shellcheck scripts/*.sh container/*.sh tools/packaging/*.sh tools/interop-tun*.sh
          tools/packaging/check-release.sh
          tools/packaging/test-install.sh
          tools/packaging/test-first-run.sh
          tools/packaging/test-container.sh
      - name: Windows installer contract
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: tools/packaging/test-install.ps1
      - name: Compatibility contract drift
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: tools/compat/check.sh
      - name: Dirty-tree guard (tracked files)
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: git diff --no-ext-diff --name-only --exit-code || (echo "Build/test modified tracked files above."; exit 1)
      - name: Dirty-tree guard (untracked files)
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          if git ls-files --others --exclude-standard --directory --no-empty-directory --error-unmatch -- ':/*'
          then
            echo "Build/test created untracked files (listed above)."
            exit 1
          fi

  cross:
    name: Cross-check (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            packages: gcc-aarch64-linux-gnu
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            packages: gcc-arm-linux-gnueabihf
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            packages: musl-tools
          - target: aarch64-apple-darwin
            os: macos-latest
            packages: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            packages: ''
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: cross-${{ matrix.target }}
      - name: Install cross-compilers
        if: ${{ matrix.packages != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: cargo check --target
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo check --workspace --locked --target ${{ matrix.target }}

  msrv:
    name: MSRV (1.91)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.91.0'
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: msrv-1.91
      - name: cargo check (MSRV)
        run: cargo check --workspace --locked

  testcontrol:
    name: Go testcontrol interop
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
      - name: Build testcontrol binary
        run: bash tools/testcontrol/build.sh
      - name: Run interop tests
        run: cargo test -p rustscale-interop-testcontrol --locked -- --nocapture --test-threads=1

  linux-replacement:
    name: Installed Linux replacement journey
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: linux-replacement
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
      - name: Run bounded installed replacement journey
        env:
          RUSTSCALE_REQUIRE_LINUX_REPLACEMENT: '1'
          RUSTSCALE_LINUX_REPLACEMENT_TIMEOUT: '900'
          RUSTSCALE_LINUX_REPLACEMENT_PHASE_FILE: ${{ runner.temp }}/linux-replacement.phase
          # This is a functional install/TUN gate. release.yml separately builds
          # and smokes the production thin-LTO artifacts.
          CARGO_PROFILE_RELEASE_LTO: 'off'
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '16'
          CARGO_PROFILE_RELEASE_OPT_LEVEL: '0'
        run: |
          # Keep privileged descendant descriptors off the runner log pipe so
          # the process-group deadline can return even during forced teardown.
          log="$RUNNER_TEMP/linux-replacement.log"
          set +e
          tools/packaging/test-linux-replacement.sh >"$log" 2>&1 &
          journey_pid=$!
          (
            last_phase=
            while kill -0 "$journey_pid" 2>/dev/null; do
              phase=$(cat "$RUSTSCALE_LINUX_REPLACEMENT_PHASE_FILE" 2>/dev/null || echo starting)
              if [[ "$phase" != "$last_phase" ]]; then
                echo "::notice title=Linux replacement::phase=$phase"
                last_phase=$phase
              fi
              echo "[linux-replacement] bounded journey still running (phase=$phase)"
              sleep 60
            done
          ) &
          heartbeat_pid=$!
          wait "$journey_pid"
          status=$?
          kill "$heartbeat_pid" 2>/dev/null || true
          wait "$heartbeat_pid" 2>/dev/null || true
          cat "$log"
          exit "$status"

  ignore-guard:
    name: #[ignore] count guard (L6)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check #[ignore] count
        run: IGNORE_GUARD_MODE=check tools/ignore-guard.sh

  alls-green:
    name: All green
    if: always()
    needs: [check, cross, msrv, testcontrol, linux-replacement, ignore-guard]
    runs-on: ubuntu-latest
    steps:
      - name: Decide if change is okay to merge
        uses: re-actors/alls-green@afee1c1eac2a506084c274e9c02c8e0687b48d9e # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
