name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build, test, clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --all --check

  testcontrol:
    name: Go testcontrol interop
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Checkout Tailscale Go repo
        uses: actions/checkout@v6
        with:
          repository: tailscale/tailscale
          path: tailscale-go
          fetch-depth: 1
      - name: Build testcontrol binary
        env:
          TS_GO_PATH: ${{ github.workspace }}/tailscale-go
        run: bash tools/testcontrol/build.sh
      - name: Run interop tests
        run: cargo test -p rustscale-interop-testcontrol -- --nocapture --test-threads=1
