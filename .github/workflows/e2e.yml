name: E2E

# Ephemeral-tailnet e2e tests. Runs on master pushes only (not every PR) to keep
# GitHub API and Tailscale API usage low. Manual trigger available.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: Ephemeral tailnet E2E
    # Restrict token minting to the trusted upstream repository.
    if: github.repository == 'rajsinghtech/rustscale'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # mint GitHub OIDC JWT for Tailscale WIF token-exchange
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # Exchange GitHub's short-lived OIDC identity; no long-lived secret in CI.
      - name: Mint Tailscale org token via GitHub OIDC (WIF)
        id: tsauth
        run: |
          AUD="api.tailscale.com/TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL"
          # The exchange endpoint intermittently 500s, after which the JWT is
          # rejected with 400s — so re-mint a fresh JWT on every attempt.
          TOKEN=""
          for i in 1 2 3 4 5; do
            JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD" | jq -r '.value')
            echo "::add-mask::$JWT"
            TOKEN=$(curl -sS -X POST https://api.tailscale.com/api/v2/oauth/token-exchange \
              -H 'Content-Type: application/x-www-form-urlencoded' \
              -d 'client_id=TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL' -d "jwt=$JWT" | jq -r '.access_token')
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then break; fi
            echo "token-exchange attempt $i failed; retrying" >&2
            sleep $((i * 5))
          done
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "OIDC token-exchange failed" >&2; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # Creates an ephemeral tailnet, exports TS_E2E_* env for the tests, and
      # guarantees deletion via the child OAuth client credentials.
      - name: Run e2e tests against ephemeral tailnet
        env:
          TS_ORG_TOKEN: ${{ steps.tsauth.outputs.token }}
        run: tools/e2e.sh

  # ---------------------------------------------------------------------------
  # Cross-client interop: rustscale <-> Go tailscaled.
  # Separate job so core e2e stays fast. Installs the real Go tailscale client
  # and runs tools/interop.sh which provisions a tailnet, starts tailscaled in
  # userspace mode, and runs the `interop_` test suite.
  # ---------------------------------------------------------------------------
  interop:
    name: Cross-client interop (rustscale <-> Go tailscaled)
    if: github.repository == 'rajsinghtech/rustscale'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # Install the Go tailscale client (apt repo). The install script adds
      # the Tailscale signing key and apt source, then installs tailscale.
      - name: Install Go tailscale client
        run: |
          installer=$(mktemp)
          trap 'rm -f "$installer"' EXIT
          curl --proto '=https' --tlsv1.2 -fsSL \
            --retry 5 --retry-all-errors --retry-delay 2 \
            -o "$installer" https://tailscale.com/install.sh
          sh "$installer"
          tailscale version

      - name: Mint Tailscale org token via GitHub OIDC (WIF)
        id: tsauth
        run: |
          AUD="api.tailscale.com/TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL"
          # The exchange endpoint intermittently 500s, after which the JWT is
          # rejected with 400s — so re-mint a fresh JWT on every attempt.
          TOKEN=""
          for i in 1 2 3 4 5; do
            JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD" | jq -r '.value')
            echo "::add-mask::$JWT"
            TOKEN=$(curl -sS -X POST https://api.tailscale.com/api/v2/oauth/token-exchange \
              -H 'Content-Type: application/x-www-form-urlencoded' \
              -d 'client_id=TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL' -d "jwt=$JWT" | jq -r '.access_token')
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then break; fi
            echo "token-exchange attempt $i failed; retrying" >&2
            sleep $((i * 5))
          done
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "OIDC token-exchange failed" >&2; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run interop tests (rustscale <-> Go tailscaled)
        env:
          TS_ORG_TOKEN: ${{ steps.tsauth.outputs.token }}
        run: tools/interop.sh

  # ---------------------------------------------------------------------------
  # TUN-mode interop: rustscale in TUN mode <-> Go tailscaled in userspace.
  # The test binary runs under sudo to create a real TUN device + OS routes.
  # Linux only — macOS utun requires root and GitHub Actions don't grant it.
  # ---------------------------------------------------------------------------
  interop-tun:
    name: TUN-mode interop (rustscale TUN <-> Go userspace)
    if: github.repository == 'rajsinghtech/rustscale'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # No token or external tailnet exists yet. Fail before credential minting
      # if this runner cannot create and configure a real Linux TUN device.
      - name: Establish Linux TUN prerequisites (credential-free)
        run: tools/interop-tun-preflight.sh

      - name: Install Go tailscale client
        run: |
          installer=$(mktemp)
          trap 'rm -f "$installer"' EXIT
          curl --proto '=https' --tlsv1.2 -fsSL \
            --retry 5 --retry-all-errors --retry-delay 2 \
            -o "$installer" https://tailscale.com/install.sh
          sh "$installer"
          tailscale version

      - name: Mint Tailscale org token via GitHub OIDC (WIF)
        id: tsauth
        run: |
          AUD="api.tailscale.com/TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL"
          # The exchange endpoint intermittently 500s, after which the JWT is
          # rejected with 400s — so re-mint a fresh JWT on every attempt.
          TOKEN=""
          for i in 1 2 3 4 5; do
            JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD" | jq -r '.value')
            echo "::add-mask::$JWT"
            TOKEN=$(curl -sS -X POST https://api.tailscale.com/api/v2/oauth/token-exchange \
              -H 'Content-Type: application/x-www-form-urlencoded' \
              -d 'client_id=TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL' -d "jwt=$JWT" | jq -r '.access_token')
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then break; fi
            echo "token-exchange attempt $i failed; retrying" >&2
            sleep $((i * 5))
          done
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "OIDC token-exchange failed" >&2; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # The script builds unprivileged, then execs the test binary under sudo.
      - name: Run TUN interop tests
        env:
          TS_ORG_TOKEN: ${{ steps.tsauth.outputs.token }}
        run: tools/interop-tun.sh
