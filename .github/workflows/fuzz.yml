name: Fuzz

# Short fuzz runs on every PR; daily longer run on cron.
# Crashes are uploaded as artifacts for triage.

on:
  pull_request:
  schedule:
    - cron: '0 4 * * *' # daily 04:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [disco_decode, derp_frame, stun_parse, portmapper_pmp, portmapper_pcp]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz target (60s)
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=60
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/
          retention-days: 7
