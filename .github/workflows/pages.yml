name: Pages

# Publishes the install scripts and landing page to GitHub Pages:
#   https://rajsinghtech.github.io/rustscale/install.sh
#   https://rajsinghtech.github.io/rustscale/install.ps1
#   https://rajsinghtech.github.io/rustscale/
#
# The scripts download prebuilt binaries from GitHub Releases — Pages only
# hosts the scripts + a landing page (no package server needed).

on:
  push:
    branches: [master]
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'site/**'
      - 'assets/rustscale-logo.svg'
      - 'PERFORMANCE.md'
      - 'docs/benchmarks.md'
      - 'docs/performance/**'
      - 'tools/packaging/check-pages-performance.py'
      - 'tools/packaging/test-install.sh'
      - 'LICENSE'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'site/**'
      - 'assets/rustscale-logo.svg'
      - 'PERFORMANCE.md'
      - 'docs/benchmarks.md'
      - 'docs/performance/**'
      - 'tools/packaging/check-pages-performance.py'
      - 'tools/packaging/test-install.sh'
      - 'LICENSE'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Assemble site
        run: |
          shellcheck scripts/install.sh
          tools/packaging/test-install.sh
          python3 tools/packaging/check-pages-performance.py
          mkdir -p _site/assets
          cp -R site/. _site/
          cp scripts/install.sh   _site/install.sh
          cp scripts/install.ps1  _site/install.ps1
          cp assets/rustscale-logo.svg _site/assets/

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
