name: Pages

# Publishes the install scripts and landing page to GitHub Pages:
#   https://rajsinghtech.github.io/rustscale/install.sh
#   https://rajsinghtech.github.io/rustscale/install.ps1
#   https://rajsinghtech.github.io/rustscale/
#
# The scripts download prebuilt binaries from GitHub Releases — Pages only
# hosts the scripts + a landing page (no package server needed).

on:
  push:
    branches: [master]
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'site/**'
      - 'assets/rustscale-logo.svg'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp scripts/install.sh   _site/install.sh
          cp scripts/install.ps1  _site/install.ps1
          cp site/index.html      _site/index.html
          cp assets/rustscale-logo.svg _site/assets/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
