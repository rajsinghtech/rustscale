name: Release

# Build and publish release artifacts on tag push (v*).
# Produces:
#   - macOS universal bundle (lipo'd librustscale.dylib + .a + rustscale.h)
#   - Linux per-target bundles (gnu x86_64/aarch64, musl x86_64)
#   - Windows x86_64 zip (rustscale.exe + rustscaled.exe)
#   - SHA256SUMS checksum file
#   - GitHub Release with all artifacts attached
#   - Homebrew formula pushed to rajsinghtech/homebrew-tap
#
# Binaries (rustscale CLI + rustscaled daemon) are built for all targets.
# Add new binary crates to BIN_PKGS below and the workflow picks them up.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create release + upload assets

env:
  CARGO_TERM_COLOR: always
  # Space-separated list of binary crates to build + lipo, as "pkg:bin" pairs
  # (cargo package name : binary artifact name). Add new entries as needed.
  BIN_PKGS: 'rustscale-rustscaled:rustscaled rustscale-cli:rustscale'

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      series: ${{ steps.release.outputs.series }}
      notes: ${{ steps.release.outputs.notes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Match tag, workspace version, and release notes
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid release tag: $tag" >&2
            exit 1
          }
          version="${tag#v}"
          manifest_version=$(awk '
            /^\[workspace.package\]/ { workspace = 1; next }
            workspace && /^version = / { gsub(/[\" ]/, "", $3); print $3; exit }
          ' Cargo.toml)
          test "$version" = "$manifest_version" || {
            echo "tag $tag does not match workspace version $manifest_version" >&2
            exit 1
          }
          notes="docs/release-notes-${version}.md"
          test -s "$notes" || { echo "missing release notes: $notes" >&2; exit 1; }
          {
            echo "version=$version"
            echo "series=${version%.*}"
            echo "notes=$notes"
          } >> "$GITHUB_OUTPUT"

  crate-packages:
    name: Assemble Cargo packages
    needs: [metadata]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: cargo-package
      - name: Package every workspace crate
        run: cargo package --workspace --no-verify --locked

  # -------------------------------------------------------------------------
  # macOS: universal binary (aarch64 + x86_64 lipo'd)
  # -------------------------------------------------------------------------
  macos:
    name: macOS universal
    needs: [metadata]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history for git describe version stamping
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build FFI (both architectures)
        run: |
          cargo build -p rustscale-ffi --release --locked --target aarch64-apple-darwin
          cargo build -p rustscale-ffi --release --locked --target x86_64-apple-darwin

      - name: Build binary crates (both architectures)
        if: env.BIN_PKGS != ''
        run: |
          for entry in $BIN_PKGS; do
            pkg="${entry%:*}"
            cargo build -p "$pkg" --release --locked --target aarch64-apple-darwin
            cargo build -p "$pkg" --release --locked --target x86_64-apple-darwin
          done

      - name: Generate C header
        run: bash tools/gen-header.sh

      - name: Lipo universal libraries + binaries
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/librustscale.dylib \
            target/x86_64-apple-darwin/release/librustscale.dylib \
            -output dist/librustscale.dylib
          lipo -create \
            target/aarch64-apple-darwin/release/librustscale.a \
            target/x86_64-apple-darwin/release/librustscale.a \
            -output dist/librustscale.a
          for entry in $BIN_PKGS; do
            bin="${entry##*:}"
            lipo -create \
              "target/aarch64-apple-darwin/release/$bin" \
              "target/x86_64-apple-darwin/release/$bin" \
              -output "dist/$bin"
          done

      - name: Bundle
        run: |
          cp include/rustscale.h LICENSE dist/
          tar --format=ustar -czf rustscale-universal-apple-darwin.tar.gz -C dist .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rustscale-universal-apple-darwin
          path: rustscale-universal-apple-darwin.tar.gz
          retention-days: 14

  # -------------------------------------------------------------------------
  # Linux: per-target bundles (gnu x86_64/aarch64, musl x86_64)
  # -------------------------------------------------------------------------
  linux:
    name: Linux ${{ matrix.target }}
    needs: [metadata]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
            musl: false
          - target: aarch64-unknown-linux-gnu
            cross: true
            musl: false
          - target: x86_64-unknown-linux-musl
            cross: false
            musl: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl toolchain
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build FFI
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build -p rustscale-ffi --release --locked --target ${{ matrix.target }}

      - name: Build binary crates
        if: env.BIN_PKGS != ''
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: |
          for entry in $BIN_PKGS; do
            pkg="${entry%:*}"
            cargo build -p "$pkg" --release --locked --target ${{ matrix.target }}
          done

      - name: Verify C header
        run: |
          test -f include/rustscale.h || { echo "header not generated"; exit 1; }

      - name: Bundle
        run: |
          set -e
          mkdir -p dist
          libdir="target/${{ matrix.target }}/release"
          # cdylib: .so on Linux (gnu + musl)
          cp "$libdir/librustscale.so" dist/ 2>/dev/null || true
          cp "$libdir/librustscale.a" dist/
          cp include/rustscale.h LICENSE dist/
          cp packaging/systemd/rustscaled.service dist/
          cp packaging/systemd/rustscaled.default dist/
          for entry in $BIN_PKGS; do
            bin="${entry##*:}"
            cp "$libdir/$bin" dist/ 2>/dev/null || true
          done
          tar --format=ustar -czf rustscale-${{ matrix.target }}.tar.gz -C dist .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rustscale-${{ matrix.target }}
          path: rustscale-${{ matrix.target }}.tar.gz
          retention-days: 14

  # -------------------------------------------------------------------------
  # Windows: x86_64 binaries (MSVC)
  # -------------------------------------------------------------------------
  windows:
    name: Windows x86_64
    needs: [metadata]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Build binary crates
        if: env.BIN_PKGS != ''
        shell: bash
        run: |
          for entry in $BIN_PKGS; do
            pkg="${entry%:*}"
            cargo build -p "$pkg" --release --locked
          done

      - name: Bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          foreach ($entry in $env:BIN_PKGS -split ' ') {
            $bin = ($entry -split ':')[1]
            Copy-Item "target/release/$bin.exe" "dist/" -ErrorAction Stop
          }
          Copy-Item LICENSE "dist/" -ErrorAction Stop
          Compress-Archive -Path dist/* -DestinationPath rustscale-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rustscale-x86_64-pc-windows-msvc
          path: rustscale-x86_64-pc-windows-msvc.zip
          retention-days: 14

  # -------------------------------------------------------------------------
  # Docker image — multi-arch build, push to GHCR
  # -------------------------------------------------------------------------
  docker:
    name: Docker image
    needs: [metadata]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO_LOWER="ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "image=${REPO_LOWER}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RUSTSCALE_VERSION=${{ needs.metadata.outputs.version }}
            RUSTSCALE_REVISION=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:${{ needs.metadata.outputs.series }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Checksums + GitHub Release
  # -------------------------------------------------------------------------
  release:
    name: Checksums + GitHub Release
    needs: [metadata, crate-packages, macos, linux, windows, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Collect artifacts + compute checksums
        run: |
          mkdir -p release
          find artifacts \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          test "$(find . -maxdepth 1 \( -name '*.tar.gz' -o -name '*.zip' \) | wc -l)" -eq 5
          find . -maxdepth 1 \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec sha256sum {} + | LC_ALL=C sort -k2 | sed 's| \./| |' > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
          body_path: ${{ needs.metadata.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # -------------------------------------------------------------------------
  # Homebrew tap — publish formula to rajsinghtech/homebrew-tap
  # -------------------------------------------------------------------------
  homebrew:
    name: Update Homebrew tap
    needs: [release]
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compute asset URLs and SHA256
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Download each archive and compute SHA256
          for asset in \
            "rustscale-universal-apple-darwin.tar.gz" \
            "rustscale-x86_64-unknown-linux-gnu.tar.gz" \
            "rustscale-aarch64-unknown-linux-gnu.tar.gz"; do
            curl -fsSL -o "$asset" "${BASE}/${asset}"
            sha256sum "$asset" | awk '{print $1}' > "${asset}.sha256"
          done

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "darwin_url=${BASE}/rustscale-universal-apple-darwin.tar.gz"
            echo "darwin_sha256=$(cat rustscale-universal-apple-darwin.tar.gz.sha256)"
            echo "linux_gnu_url=${BASE}/rustscale-x86_64-unknown-linux-gnu.tar.gz"
            echo "linux_gnu_sha256=$(cat rustscale-x86_64-unknown-linux-gnu.tar.gz.sha256)"
            echo "linux_arm_url=${BASE}/rustscale-aarch64-unknown-linux-gnu.tar.gz"
            echo "linux_arm_sha256=$(cat rustscale-aarch64-unknown-linux-gnu.tar.gz.sha256)"
          } >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rajsinghtech/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap
          fetch-depth: 1

      - name: Write formula
        env:
          VERSION: ${{ steps.assets.outputs.version }}
          DARWIN_URL: ${{ steps.assets.outputs.darwin_url }}
          DARWIN_SHA: ${{ steps.assets.outputs.darwin_sha256 }}
          LINUX_GNU_URL: ${{ steps.assets.outputs.linux_gnu_url }}
          LINUX_GNU_SHA: ${{ steps.assets.outputs.linux_gnu_sha256 }}
          LINUX_ARM_URL: ${{ steps.assets.outputs.linux_arm_url }}
          LINUX_ARM_SHA: ${{ steps.assets.outputs.linux_arm_sha256 }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/rustscale.rb <<EOF
          class Rustscale < Formula
            desc "Rust implementation of Tailscale's client stack"
            homepage "https://github.com/rajsinghtech/rustscale"
            version "${VERSION}"
            license "BSD-3-Clause"

            on_macos do
              url "${DARWIN_URL}"
              sha256 "${DARWIN_SHA}"
            end

            on_linux do
              on_intel do
                url "${LINUX_GNU_URL}"
                sha256 "${LINUX_GNU_SHA}"
              end
              on_arm do
                url "${LINUX_ARM_URL}"
                sha256 "${LINUX_ARM_SHA}"
              end
            end

            def install
              bin.install "rustscale"
              bin.install "rustscaled"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/rustscale --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/rustscale.rb
          if git diff --quiet --cached; then
            echo "No changes to formula — already up to date"
            exit 0
          fi
          git commit -m "rustscale ${{ steps.assets.outputs.version }}"
          git push
