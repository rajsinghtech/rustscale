# cbindgen config for rustscale C header generation.
# Run: tools/gen-header.sh  (or `cargo build -p rustscale-ffi` triggers build.rs)

language = "C"

header = """\
// rustscale C ABI - libtailscale equivalent
//
// Auto-generated by cbindgen. Do not edit; run tools/gen-header.sh.
//
// All functions return 0 on success and a negative errno-style code on error
// unless otherwise noted.  String arguments are NUL-terminated C strings; the
// caller retains ownership.  Buffer arguments (errmsg, status_json) are filled
// by the callee up to *buflen bytes; the actual number of bytes written
// (excluding the NUL) is returned, or a negative code on error.
//
// Handles are opaque non-negative integers.  Every handle must be closed:
//   ts_close        for server handles,
//   ts_listener_close for listener handles,
//   ts_conn_close   for connection handles.
"""

include_guard = "RUSTSCALE_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not edit. */"
style = "both"
sort_by = "Name"
usize_is_size_t = true

[parse]
parse_deps = false
