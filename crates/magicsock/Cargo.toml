[package]
name = "rustscale-magicsock"
description = "Path-selection engine for rustscale (direct/DERP/peer-relay)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# NOTE: this crate intentionally does NOT inherit workspace lints
# (`[lints] workspace = true`). The PMTUD platform modules require raw libc
# setsockopt calls which are unavoidably `unsafe`. The workspace policy
# forbids `unsafe_code`; we downgrade to `deny` so individual modules can
# opt in via `#[allow(unsafe_code)]`.
[lints.rust]
unsafe_code = "deny"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_const_for_fn = "allow"
too_many_lines = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
needless_pass_by_value = "allow"
struct_excessive_bools = "allow"
enum_glob_use = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
similar_names = "allow"
match_same_arms = "allow"
match_wildcard_for_single_variants = "allow"
return_self_not_must_use = "allow"
unreadable_literal = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_wraps = "allow"
zero_sized_map_values = "allow"
while_let_loop = "allow"
manual_let_else = "allow"
needless_continue = "allow"
cloned_ref_to_slice_refs = "allow"
uninlined_format_args = "allow"
empty_line_after_doc_comments = "allow"
drop_non_drop = "allow"
duration_suboptimal_units = "allow"

[dependencies]
rustscale-key = { path = "../key", version = "0.1.3" }
rustscale-tailcfg = { path = "../tailcfg", version = "0.1.3" }
rustscale-disco = { path = "../disco", version = "0.1.3" }
rustscale-derp = { path = "../derp", version = "0.1.3" }
rustscale-portmapper = { path = "../portmapper", version = "0.1.3" }
rustscale-health = { path = "../health", version = "0.1.3" }
rustscale-udprelay = { path = "../udprelay", version = "0.1.3" }
rustscale-neterror = { path = "../neterror", version = "0.1.3" }
rustscale-sockstats = { path = "../sockstats", version = "0.1.3" }
rustscale-ipnstate = { path = "../ipnstate", version = "0.1.3" }
rustscale-controlknobs = { path = "../controlknobs", version = "0.1.3" }
rustscale-netns.workspace = true
thiserror.workspace = true
log = "0.4"
tokio.workspace = true
bytes.workspace = true
rand.workspace = true
hex.workspace = true
if-addrs.workspace = true
libc.workspace = true
socket2.workspace = true

[dev-dependencies]
async-trait.workspace = true
tokio.workspace = true
rustscale-key = { path = "../key", version = "0.1.3" }
rustscale-routecheck.workspace = true
