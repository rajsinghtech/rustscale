[package]
name = "rustscale-netstack"
description = "Userspace TCP/IP stack for rustscale (smoltcp over WireGuard)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
rustscale-wg = { path = "../wg", version = "0.1.5" }
rustscale-key = { path = "../key", version = "0.1.5" }
rustscale-packet = { path = "../packet", version = "0.1.5" }
smoltcp.workspace = true
thiserror.workspace = true
tokio.workspace = true
bytes.workspace = true
tokio-util.workspace = true
futures-util = "0.3"
rand.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
rustscale-wg = { path = "../wg", version = "0.1.5" }
rustscale-key = { path = "../key", version = "0.1.5" }
