[package]
name = "rustscale-rustscaled"
description = "rustscale daemon binary with macOS launchd install/uninstall"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[[bin]]
name = "rustscaled"
path = "src/main.rs"

[dependencies]
rustscale-tsnet = { path = "../tsnet", version = "0.1.3", features = ["identity-federation"] }
rustscale-safesocket = { path = "../safesocket", version = "0.1.3" }
rustscale-conffile = { path = "../conffile", version = "0.1.3" }
rustscale-ipn = { path = "../ipn", version = "0.1.3" }
rustscale-logpolicy = { path = "../logpolicy", version = "0.1.3" }
rustscale-logtail = { path = "../logtail", version = "0.1.3" }
rustscale-syspolicy.workspace = true
tokio.workspace = true
thiserror.workspace = true
log.workspace = true

[dev-dependencies]
rustscale-localclient = { path = "../localclient", version = "0.1.3" }
rustscale-testcontrol = { path = "../testcontrol", version = "0.1.3" }
serde_json.workspace = true
tempfile = "3"
