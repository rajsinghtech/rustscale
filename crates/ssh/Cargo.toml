[package]
name = "rustscale-ssh"
description = "Tailscale SSH server for rustscale — port of Go's ssh/tailssh"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_const_for_fn = "allow"
too_many_lines = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
needless_pass_by_value = "allow"
struct_excessive_bools = "allow"
enum_glob_use = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
similar_names = "allow"
match_same_arms = "allow"
match_wildcard_for_single_variants = "allow"
return_self_not_must_use = "allow"
unreadable_literal = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_wraps = "allow"
zero_sized_map_values = "allow"
while_let_loop = "allow"
manual_let_else = "allow"
needless_continue = "allow"
cloned_ref_to_slice_refs = "allow"
uninlined_format_args = "allow"
empty_line_after_doc_comments = "allow"
drop_non_drop = "allow"
duration_suboptimal_units = "allow"

[dependencies]
rustscale-key = { path = "../key", version = "0.1.5" }
rustscale-tailcfg = { path = "../tailcfg", version = "0.1.5" }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
ed25519-dalek.workspace = true
sha2.workspace = true
base64.workspace = true
chrono.workspace = true
# RustScale derives Ed25519 host keys, and Tailscale SSH authenticates tailnet
# identities rather than RSA user keys. RSA-only clients are intentionally not
# supported, so keep russh's optional RSA stack disabled.
russh = { version = "0.62.2", default-features = false, features = ["flate2", "ring"] }
log = "0.4"
libc.workspace = true
h2.workspace = true
bytes.workspace = true
http = "1"

[dev-dependencies]
tokio.workspace = true
