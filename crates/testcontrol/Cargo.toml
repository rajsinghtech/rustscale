[package]
name = "rustscale-testcontrol"
description = "In-process fake Tailscale control server for integration testing"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
rustscale-key = { path = "../key", version = "0.1.1" }
rustscale-tailcfg = { path = "../tailcfg", version = "0.1.1" }
rustscale-controlclient = { path = "../controlclient", version = "0.1.1" }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
h2.workspace = true
http = "1"
bytes.workspace = true
base64.workspace = true
rand.workspace = true
chrono.workspace = true
thiserror.workspace = true

[dev-dependencies]
# Intentionally path-only: keeping this dev-only back-edge out of the published
# manifest breaks the testcontrol <-> tsnet package cycle.
rustscale-tsnet = { path = "../tsnet" }
rustscale-derp = { path = "../derp", version = "0.1.1" }
rustscale-tailcfg = { path = "../tailcfg", version = "0.1.1" }
rustscale-key = { path = "../key", version = "0.1.1" }
rustscale-magicsock = { path = "../magicsock", version = "0.1.1" }
rustscale-udprelay = { path = "../udprelay", version = "0.1.1" }
tempfile = "3"
