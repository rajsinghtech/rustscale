[package]
name = "rustscale-tsnet"
description = "Public embedding API for rustscale — Go tsnet equivalent"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_const_for_fn = "allow"
too_many_lines = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
needless_pass_by_value = "allow"
struct_excessive_bools = "allow"
enum_glob_use = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
similar_names = "allow"
match_same_arms = "allow"
match_wildcard_for_single_variants = "allow"
return_self_not_must_use = "allow"
unreadable_literal = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_wraps = "allow"
zero_sized_map_values = "allow"
while_let_loop = "allow"
manual_let_else = "allow"
needless_continue = "allow"
cloned_ref_to_slice_refs = "allow"
uninlined_format_args = "allow"
empty_line_after_doc_comments = "allow"
drop_non_drop = "allow"
duration_suboptimal_units = "allow"
map_unwrap_or = "allow"

[dependencies]
rustscale-key = { path = "../key", version = "0.1.3" }
rustscale-tailcfg = { path = "../tailcfg", version = "0.1.3" }
rustscale-tka = { path = "../tka", version = "0.1.3" }
rustscale-controlclient = { path = "../controlclient", version = "0.1.3" }
rustscale-controlknobs = { path = "../controlknobs", version = "0.1.3" }
rustscale-magicsock = { path = "../magicsock", version = "0.1.3" }
rustscale-derp = { path = "../derp", version = "0.1.3" }
rustscale-netcheck = { path = "../netcheck", version = "0.1.3" }
rustscale-routecheck.workspace = true
rustscale-wg = { path = "../wg", version = "0.1.3" }
rustscale-netstack = { path = "../netstack", version = "0.1.3" }
rustscale-tun = { path = "../tun", version = "0.1.3" }
rustscale-filter = { path = "../filter", version = "0.1.3" }
rustscale-dns = { path = "../dns", version = "0.1.3" }
rustscale-netmon = { path = "../netmon", version = "0.1.3" }
rustscale-routetable = { path = "../routetable", version = "0.1.3" }
rustscale-portmapper = { path = "../portmapper", version = "0.1.3" }
rustscale-health = { path = "../health", version = "0.1.3" }
rustscale-udprelay = { path = "../udprelay", version = "0.1.3" }
rustscale-c2n = { path = "../c2n", version = "0.1.3" }
rustscale-posture = { path = "../posture", version = "0.1.3" }
rustscale-tcpinfo = { path = "../tcpinfo", version = "0.1.3" }
rustscale-safesocket = { path = "../safesocket", version = "0.1.3" }
rustscale-clientmetric = { path = "../clientmetric", version = "0.1.3" }
rustscale-ipn = { path = "../ipn", version = "0.1.3" }
rustscale-ipnext = { path = "../ipnext", version = "0.1.3" }
rustscale-tsd = { path = "../tsd", version = "0.1.3" }
rustscale-auditlog = { path = "../auditlog", version = "0.1.3" }
rustscale-atomicfile = { path = "../atomicfile", version = "0.1.3" }
rustscale-ipnstate = { path = "../ipnstate", version = "0.1.3" }
rustscale-appc = { path = "../appc", version = "0.1.3" }
rustscale-bakedroots = { path = "../bakedroots", version = "0.1.3" }
rustscale-tsaddr = { path = "../tsaddr", version = "0.1.3" }
rustscale-art.workspace = true
rustscale-router = { path = "../router", version = "0.1.3" }
rustscale-sockstats = { path = "../sockstats", version = "0.1.3" }
rustscale-conffile = { path = "../conffile", version = "0.1.3" }
rustscale-proxymap = { path = "../proxymap", version = "0.1.3" }
rustscale-portlist = { path = "../portlist", version = "0.1.3" }
rustscale-packet = { path = "../packet", version = "0.1.3" }
rustscale-clientupdate = { path = "../clientupdate", version = "0.1.3" }
rustscale-envknob = { path = "../envknob", version = "0.1.3" }
rustscale-feature = { path = "../feature", version = "0.1.3" }
rustscale-identityfederation = { path = "../identityfederation", version = "0.1.3", optional = true }
rustscale-logid = { path = "../logid", version = "0.1.3" }
rustscale-logtail = { path = "../logtail", version = "0.1.3" }
rustscale-netlog = { path = "../netlog", version = "0.1.3" }
rustscale-netlogtype = { path = "../netlogtype", version = "0.1.3" }
rustscale-netns.workspace = true
rustscale-tsdial = { path = "../tsdial", version = "0.1.3" }
rustscale-dnsname = { path = "../dnsname", version = "0.1.3" }
rustscale-drive = { path = "../drive", version = "0.1.3" }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rcgen.workspace = true
base64.workspace = true
crc32fast.workspace = true
chrono.workspace = true
p256.workspace = true
sha2.workspace = true
hex.workspace = true
webpki-roots.workspace = true
async-trait.workspace = true
rand_core.workspace = true
libc.workspace = true
log.workspace = true
zeroize = "1"

[dev-dependencies]
tokio.workspace = true
rustscale-key = { path = "../key", version = "0.1.3" }
rustscale-tailcfg = { path = "../tailcfg", version = "0.1.3" }
rustscale-testcontrol = { path = "../testcontrol", version = "0.1.3" }
rustscale-safesocket = { path = "../safesocket", version = "0.1.3" }
# Intentionally path-only: localclient depends on tsnet at runtime, so this
# test-only back-edge must not enter the published dependency graph.
rustscale-localclient = { path = "../localclient" }
rustscale-ipn = { path = "../ipn", version = "0.1.3" }
tempfile = "3"

[features]
identity-federation = ["dep:rustscale-identityfederation"]
ssh = ["dep:rustscale-ssh", "dep:russh"]

[dependencies.rustscale-ssh]
path = "../ssh"
version = "0.1.3"
optional = true

[dependencies.russh]
version = "0.62.2"
default-features = false
features = ["flate2", "ring"]
optional = true
